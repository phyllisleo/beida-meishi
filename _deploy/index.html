<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PKU Canteens 北大美食 v2</title>
<style>
  :root{
    --pku:#94070a; --pku-dark:#6e0507; --pku-soft:#fbe9e9;
    --ink:#1f2125; --muted:#8a8f98; --line:#ececef;
    --bg:#f3f4f6; --green:#2fae6b; --amber:#f0a020; --red:#e0473d;
    --card:#ffffff; --shadow:0 6px 22px rgba(0,0,0,.08); --blue:#4285f4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(135deg,#d9d9de,#eceef2);color:var(--ink);
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .phone{width:390px;height:800px;max-height:94vh;background:#000;border-radius:46px;padding:11px;
    box-shadow:0 30px 70px rgba(0,0,0,.35);position:relative}
  .screen{width:100%;height:100%;background:var(--bg);border-radius:36px;overflow:hidden;
    position:relative;display:flex;flex-direction:column}
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);
    width:150px;height:28px;background:#000;border-radius:0 0 18px 18px;z-index:50}
  .statusbar{height:44px;flex:0 0 44px;display:flex;align-items:center;justify-content:space-between;
    padding:0 26px;font-size:13px;font-weight:600;color:#fff;background:var(--pku)}
  .statusbar .right{display:flex;gap:6px;align-items:center;font-size:12px}
  .appbar{flex:0 0 auto;background:var(--pku);color:#fff;padding:2px 18px 14px;
    display:flex;align-items:center;justify-content:space-between}
  .brand .logo{font-size:18px;font-weight:800}.brand .cn{font-size:14px;opacity:.9;margin-left:7px}
  .langtoggle{display:flex;background:rgba(255,255,255,.18);border-radius:20px;padding:3px;font-size:12px;font-weight:700}
  .langtoggle button{border:0;background:transparent;color:#fff;padding:5px 11px;border-radius:16px;cursor:pointer;font-weight:700}
  .langtoggle button.active{background:#fff;color:var(--pku)}
  .body{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .body::-webkit-scrollbar{width:0}
  .pad{padding:16px}
  .view{display:none}.view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ── Hero ── */
  .home-hero{background:linear-gradient(135deg,var(--pku),var(--pku-dark));border-radius:20px;
    padding:24px 18px 24px;margin-bottom:14px;color:#fff;box-shadow:0 8px 28px rgba(148,7,10,.3)}
  .hero-welcome-label{font-size:11px;font-weight:700;opacity:.75;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
  .hero-welcome-text{font-size:18px;font-weight:800;line-height:1.45;margin-bottom:24px}
  .hero-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .hero-btn{background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.32);border-radius:16px;
    padding:20px 10px 18px;display:flex;flex-direction:column;align-items:center;gap:9px;
    cursor:pointer;color:#fff;transition:background .15s,transform .12s}
  .hero-btn:active{background:rgba(255,255,255,.26);transform:scale(.97)}
  .hero-btn svg{width:42px;height:42px}
  .hero-btn .hb-yuan{font-size:42px;font-weight:300;line-height:1}
  .hero-btn .hb-label{font-size:13px;font-weight:800;text-align:center}
  .hero-btn .hb-sub{font-size:10px;opacity:.72;text-align:center;line-height:1.3}
  .hero-btn-wide{background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.32);border-radius:16px;
    padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;color:#fff;
    transition:background .15s,transform .12s;width:100%}
  .hero-btn-wide:active{background:rgba(255,255,255,.26);transform:scale(.98)}
  .hero-btn-wide .hbw-icon{font-size:28px;flex:0 0 auto}
  .hero-btn-wide .hbw-text .hbw-label{font-size:14px;font-weight:800}
  .hero-btn-wide .hbw-text .hbw-sub{font-size:11px;opacity:.75;margin-top:2px}
  .hero-btn-wide .hbw-arr{margin-left:auto;font-size:16px;opacity:.7}

  /* ── Campus Map ── */
  .map-card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px}
  .map-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 9px}
  .map-title{font-size:14px;font-weight:800}
  .map-zoom{display:flex;gap:6px}
  .map-zoom button{width:28px;height:28px;border:1.5px solid var(--line);background:#fff;border-radius:8px;
    font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink)}
  .map-wrap{position:relative;height:210px;overflow:hidden;cursor:grab;background:#d4eaf7;touch-action:none}
  .map-wrap:active{cursor:grabbing}
  .map-inner{position:absolute;inset:0;transform-origin:center center;will-change:transform}
  .map-inner svg{width:100%;height:100%}
  /* pin pulse */
  @keyframes pulse{0%,100%{r:14;opacity:.25}50%{r:20;opacity:0}}
  .user-pulse{animation:pulse 2s ease-in-out infinite}
  /* info bar */
  .map-info-bar{background:var(--pku-soft);border-top:1px solid #f0cece;padding:10px 14px;
    display:none;align-items:center;gap:10px}
  .map-info-bar.show{display:flex}
  .mib-left{flex:1;min-width:0}
  .mib-name{font-size:13px;font-weight:800;color:var(--ink)}
  .mib-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .mib-btn{background:var(--pku);color:#fff;border:0;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer;flex:0 0 auto}
  .mib-close{font-size:18px;color:var(--muted);cursor:pointer;padding:0 4px}

  /* ── Canteen / Dish cards ── */
  .section-title{font-size:16px;font-weight:800;margin:18px 2px 10px;display:flex;align-items:center;justify-content:space-between}
  .canteen{background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-bottom:12px;
    cursor:pointer;display:flex;gap:13px;align-items:center;transition:transform .12s}
  .canteen:active{transform:scale(.98)}
  .canteen .thumb{width:54px;height:54px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:27px;flex:0 0 54px}
  .canteen .info{flex:1;min-width:0}
  .canteen .name{font-weight:800;font-size:15px;display:flex;align-items:center;gap:7px}
  .canteen .name .cn{font-weight:600;color:var(--muted);font-size:12px}
  .canteen .meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
  .crowd{margin-top:8px}.crowd .bar{height:6px;border-radius:6px;background:#eee;overflow:hidden}
  .crowd .bar i{display:block;height:100%;border-radius:6px}
  .crowd .lab{display:flex;justify-content:space-between;font-size:11px;margin-top:4px;font-weight:700}
  .pill{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px}
  .pill.open{background:#e7f7ee;color:var(--green)}.pill.closed{background:#fdeceb;color:var(--red)}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:6px}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink)}
  .chip.active{background:var(--pku);color:#fff;border-color:var(--pku)}
  .dish{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;cursor:pointer;display:flex;transition:transform .12s}
  .dish:active{transform:scale(.985)}
  .dish .pic{width:96px;flex:0 0 96px;display:flex;align-items:center;justify-content:center;font-size:42px}
  .dish .d-body{flex:1;padding:12px 12px 12px 4px;min-width:0;position:relative}
  .dish .d-name{font-weight:800;font-size:15px}
  .dish .d-py{font-size:11px;color:var(--muted);font-style:italic}
  .dish .d-en{font-size:13px;color:var(--ink);margin-top:1px}
  .dish .d-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:7px;font-size:11px;color:var(--muted)}
  .tag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px}
  .tag.veg{background:#e7f7ee;color:var(--green)}.tag.halal{background:#e8f0fe;color:#3b6fd4}
  .tag.spicy{background:#fdeceb;color:var(--red)}.tag.new{background:#fff3df;color:var(--amber)}
  .price{color:var(--pku);font-weight:800;font-size:14px}
  .heart{position:absolute;top:10px;right:10px;font-size:20px;cursor:pointer;line-height:1;user-select:none}
  .empty{text-align:center;color:var(--muted);padding:60px 30px}
  .empty .ic{font-size:50px;margin-bottom:12px}.empty .t{font-weight:800;color:var(--ink);margin-bottom:6px;font-size:16px}
  .news{background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:14px}
  .news .banner{height:110px;display:flex;align-items:center;justify-content:center;font-size:54px}
  .news .n-body{padding:13px 15px}
  .news .n-title{font-weight:800;font-size:15px}
  .news .n-sub{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5}
  .news .n-foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px}
  .rate{display:flex;gap:3px;font-size:18px;cursor:pointer}
  .rate .s{color:#d9d9de}.rate .s.on{color:var(--amber)}
  .n-date{font-size:11px;color:var(--muted)}
  .disclaimer{font-size:10.5px;color:var(--muted);text-align:center;padding:4px 24px 10px;line-height:1.5}
  /* Tab bar */
  .tabbar{flex:0 0 auto;display:flex;background:#fff;border-top:1px solid var(--line);padding:8px 0 22px}
  .tab{flex:1;text-align:center;border:0;background:transparent;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px}
  .tab .ti{font-size:21px;line-height:1}.tab.active{color:var(--pku)}
  /* Sheet */
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s;z-index:60;border-radius:36px}
  .overlay.show{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:26px 26px 36px 36px;
    transform:translateY(102%);transition:transform .3s cubic-bezier(.2,.9,.3,1);z-index:61;max-height:92%;overflow-y:auto;padding-bottom:24px}
  .sheet.show{transform:translateY(0)}
  .sheet .grab{width:44px;height:5px;border-radius:5px;background:#dcdce0;margin:10px auto 4px}
  .sheet .hero{height:150px;display:flex;align-items:center;justify-content:center;font-size:80px;margin:6px 16px 0;border-radius:18px}
  .sheet .s-pad{padding:16px 20px 0}
  .sheet .s-name{font-size:22px;font-weight:800}
  .sheet .s-py{color:var(--muted);font-style:italic;font-size:13px;margin-top:2px}
  .sheet .s-en{font-size:16px;margin-top:2px}
  .sheet .s-row{display:flex;gap:18px;margin:14px 0;padding:13px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .sheet .s-row .cell{flex:1;text-align:center}
  .sheet .s-row .cell b{display:block;font-size:17px}
  .sheet .s-row .cell span{font-size:11px;color:var(--muted)}
  .sheet h4{margin:14px 0 7px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .sheet .ingr{display:flex;gap:7px;flex-wrap:wrap}
  .sheet .ingr span{background:var(--bg);border-radius:8px;padding:6px 11px;font-size:13px}
  .loc{display:flex;align-items:center;gap:8px;font-size:14px;background:var(--pku-soft);color:var(--pku-dark);padding:11px 14px;border-radius:12px;font-weight:700;margin-top:4px}
  .btn{display:block;width:calc(100% - 40px);margin:18px 20px 0;background:var(--pku);color:#fff;border:0;border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer}
  .btn.saved{background:#fff;color:var(--pku);border:2px solid var(--pku)}
  .cn-head{background:linear-gradient(135deg,var(--pku),var(--pku-dark));color:#fff;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .cn-head .back{font-size:13px;font-weight:700;cursor:pointer;opacity:.9;margin-bottom:8px;display:inline-block}
  .cn-head h2{margin:0;font-size:20px}
  .cn-head .sub{font-size:13px;opacity:.92;margin-top:5px;display:flex;gap:12px;flex-wrap:wrap}
  /* Review */
  .review-section{padding:0 20px;margin-top:4px}
  .review-section h4{margin:14px 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .review-stars{display:flex;gap:6px;font-size:28px;margin-bottom:10px;cursor:pointer}
  .review-stars .rs{color:#d9d9de;transition:color .1s}.review-stars .rs.on{color:var(--amber)}
  .review-textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;font-size:13px;
    font-family:inherit;resize:none;outline:none;color:var(--ink);line-height:1.5;transition:border-color .15s}
  .review-textarea:focus{border-color:var(--pku)}
  .review-submit{width:100%;margin-top:10px;background:var(--pku);color:#fff;border:0;border-radius:12px;padding:12px;font-size:14px;font-weight:800;cursor:pointer}
  .review-list{margin-top:14px;display:flex;flex-direction:column;gap:10px}
  .review-item{background:var(--bg);border-radius:12px;padding:10px 12px}
  .review-item .ri-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .review-item .ri-name{font-size:12px;font-weight:800}.review-item .ri-stars{font-size:13px;color:var(--amber)}
  .review-item .ri-text{font-size:13px;line-height:1.5}.review-item .ri-date{font-size:11px;color:var(--muted);margin-top:3px}
  .no-reviews{font-size:13px;color:var(--muted);text-align:center;padding:10px 0 4px}
  /* QR Modal */
  .qr-modal{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:80;display:flex;align-items:center;
    justify-content:center;border-radius:36px;opacity:0;pointer-events:none;transition:opacity .25s}
  .qr-modal.show{opacity:1;pointer-events:auto}
  .qr-box{background:#fff;border-radius:24px;padding:24px 24px 20px;width:280px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .qr-box h3{margin:0 0 4px;font-size:17px;font-weight:800}.qr-box .qr-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
  .qr-svg{width:160px;height:160px;margin:0 auto 16px;display:block}
  .qr-name{font-size:15px;font-weight:800;margin-bottom:2px}.qr-id{font-size:12px;color:var(--muted);margin-bottom:18px}
  .qr-close{width:100%;background:var(--pku);color:#fff;border:0;border-radius:12px;padding:12px;font-size:14px;font-weight:800;cursor:pointer}
  /* TopUp Modal */
  .topup-modal{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:80;display:flex;align-items:flex-end;
    justify-content:center;border-radius:36px;opacity:0;pointer-events:none;transition:opacity .25s}
  .topup-modal.show{opacity:1;pointer-events:auto}
  .topup-sheet{background:#fff;border-radius:26px 26px 36px 36px;padding:20px 20px 32px;width:100%;box-shadow:0 -10px 40px rgba(0,0,0,.15)}
  .topup-sheet .grab{width:44px;height:5px;border-radius:5px;background:#dcdce0;margin:0 auto 18px}
  .topup-sheet h3{margin:0 0 4px;font-size:17px;font-weight:800}
  .topup-sheet .tu-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
  .tu-balance{background:linear-gradient(135deg,var(--pku),var(--pku-dark));border-radius:16px;padding:16px 18px;color:#fff;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
  .tu-balance .bal-label{font-size:12px;opacity:.8}.tu-balance .bal-amount{font-size:26px;font-weight:800}
  .tu-amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .tu-amt-btn{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:12px 6px;font-size:15px;font-weight:800;cursor:pointer;color:var(--ink)}
  .tu-amt-btn.sel{border-color:var(--pku);background:var(--pku-soft);color:var(--pku)}
  .tu-pay-btn{width:100%;background:var(--pku);color:#fff;border:0;border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px}
  .tu-close-link{display:block;text-align:center;font-size:13px;color:var(--muted);margin-top:12px;cursor:pointer;font-weight:600}
  /* Toast */
  .toast{position:absolute;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);
    background:rgba(0,0,0,.82);color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;
    font-weight:600;opacity:0;transition:.3s;z-index:70;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ── Lunch Buddy ── */
  .buddy-sheet-inner{padding:0 20px 8px}
  .buddy-sheet-inner h2{margin:14px 0 4px;font-size:20px;font-weight:800}
  .buddy-sheet-inner .bs-sub{font-size:13px;color:var(--muted);margin-bottom:14px}
  .buddy-filter-group{margin-bottom:10px}
  .buddy-filter-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
  .buddy-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
  .buddy-chips::-webkit-scrollbar{display:none}
  .buddy-chip{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;border-radius:20px;
    padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--ink);white-space:nowrap;transition:.1s}
  .buddy-chip.on{background:var(--pku);color:#fff;border-color:var(--pku)}
  .buddy-divider{height:1px;background:var(--line);margin:12px 0}
  .buddy-count{font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:600}
  .buddy-list{display:flex;flex-direction:column;gap:12px}
  .buddy-card{background:var(--bg);border-radius:16px;padding:14px}
  .buddy-card-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
  .buddy-avatar{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex:0 0 48px}
  .buddy-info{flex:1;min-width:0}
  .buddy-name{font-size:15px;font-weight:800}
  .buddy-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .buddy-times{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .buddy-time-chip{font-size:10px;font-weight:800;background:#e8eefb;color:#3b6fd4;padding:3px 8px;border-radius:8px}
  .buddy-exp{font-size:12px;color:var(--ink);line-height:1.5;margin-bottom:8px;background:#fff;border-radius:10px;padding:8px 10px}
  .buddy-tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
  .buddy-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:var(--pku-soft);color:var(--pku-dark)}
  .buddy-lang-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:#e8f6ed;color:var(--green)}
  .buddy-invite-btn{width:100%;background:var(--pku);color:#fff;border:0;border-radius:12px;padding:11px;font-size:13px;font-weight:800;cursor:pointer}
  .buddy-empty{text-align:center;padding:30px 20px;color:var(--muted)}
  .buddy-empty .be-ic{font-size:40px;margin-bottom:8px}

  /* dish photos + nav (v3) */
  .dish .pic{width:96px;flex:0 0 96px;overflow:hidden;background:#eee}
  .dish .pic img{width:100%;height:100%;object-fit:cover;display:block}
  .sheet .hero{height:150px;margin:6px 16px 0;border-radius:18px;overflow:hidden}
  .sheet .hero img{width:100%;height:100%;object-fit:cover;display:block}
  .navgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
  .navbtn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:#fff;border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;cursor:pointer;box-shadow:var(--shadow);text-align:left}
  .navbtn:active{transform:scale(.98)}
  .navbtn .nb-t{font-weight:800;font-size:14px;color:var(--ink)}
  .navbtn .nb-c{font-size:11px;color:var(--muted)}

  /* v4: lunch buddy box, post form, message, sort, detail map */
  .lb-card{background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-bottom:14px}
  .lb-head .lb-title{font-size:16px;font-weight:800}

const t = k => i18n[state.lang][k] || k;

/* ── i18n ── */
function setLang(l){
  state.lang = l;
  document.documentElement.lang = l==="zh"?"zh":"en";
  document.getElementById("lang-en").classList.toggle("active", l==="en");
  document.getElementById("lang-zh").classList.toggle("active", l==="zh");
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.getAttribute("data-i18n")); });
  renderAll();
}

/* ── Tabs ── */
function setTab(tab){
  state.tab = tab;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active", b.dataset.tab===tab));
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-"+tab).classList.add("active");
  document.getElementById("body").scrollTop = 0;
  if(tab==="menu" && !state.canteen) state.filter="all";
  renderAll();
}

/* ── Helpers ── */
function crowdColor(c){ return c>=80?"var(--red)":c>=55?"var(--amber)":"var(--green)"; }

/* ── HOME: canteen list ── */
function renderCanteens(){
  const el = document.getElementById("canteen-list");
  el.innerHTML = canteens.map(c=>{
    const col = crowdColor(c.crowd);
    const name = state.lang==="zh"? c.zh : c.en;
    const cn = state.lang==="zh"? "" : `<span class="cn">${c.zh}</span>`;
    const status = c.open
      ? `<span class="pill open">● ${t("open")} · ${c.hours}</span>`
      : `<span class="pill closed">● ${t("closed")} · ${c.hours}</span>`;
    const floors = c.floors ? `<span>🏢 ${c.floors.length} ${state.lang==="zh"?"层":"floors"}</span>` : "";
    return `<div class="canteen" onclick="openCanteen('${c.id}')">
      <div class="thumb" style="background:${c.bg}">${c.emoji}</div>
      <div class="info">
        <div class="name">${name} ${cn}</div>
        <div class="meta">${status}</div>
        <div class="meta"><span>🚶 <b>${c.walk}</b> ${t("min")}</span>${floors}</div>
        <div class="crowd"><div class="bar"><i style="width:${c.crowd}%;background:${col}"></i></div>
        <div class="lab"><span style="color:${col}">${c.crowd}% ${t("full")}</span></div></div>
      </div>
    </div>`;
  }).join("");
}

/* ── allocation helpers ── */
function canteenAllDishes(cid){ const a=alloc[cid]; if(!a) return []; if(a.dishes) return a.dishes;
  const set=new Set(); a.floors.forEach(fl=>fl.forEach(st=>st.forEach(id=>set.add(id)))); return [...set]; }
function floorAllDishes(cid,f){ const a=alloc[cid]; if(!a||!a.floors) return [];
  const set=new Set(); a.floors[f].forEach(st=>st.forEach(id=>set.add(id))); return [...set]; }
function stallDishes(cid,f,s){ const a=alloc[cid]; return (a&&a.floors)?a.floors[f][s]:[]; }
function dishById(id){ return dishes.find(d=>d.id===id); }
function dishCanteens(id){ return canteens.filter(c=>canteenAllDishes(c.id).includes(id)); }

/* ── MENU: canteen → floor → stall → dishes ── */
function openCanteen(id){ state.canteen=id; state.floor=null; state.stall=null; state.filter="all"; setTab("menu"); }
function clearCanteen(){ state.canteen=null; state.floor=null; state.stall=null; renderAll(); }
function selectFloor(f){ state.floor=f; state.stall=null; document.getElementById("body").scrollTop=0; renderAll(); }
function backToFloors(){ state.floor=null; state.stall=null; renderAll(); }
function selectStall(s){ state.stall=s; document.getElementById("body").scrollTop=0; renderAll(); }
function backToStalls(){ state.stall=null; renderAll(); }
function goAllMenu(){ state.canteen=null; state.floor=null; state.stall=null; state.filter="all"; setTab("menu"); }

function setFilter(f){ state.filter=f; renderAll(); }
function tagLabel(tg){ return {veg:t("filterVeg"),halal:t("filterHalal"),spicy:t("filterSpicy"),new:t("filterNew")}[tg]||tg; }

function dishCard(d, loc){
  const saved = state.wishlist.has(d.id);
  const tags = d.tags.map(tg=>`<span class="tag ${tg}">${tagLabel(tg)}</span>`).join(" ");
  const where = loc || (state.lang==="zh"?"多个食堂":"Various canteens");
  const revCount = (reviews[d.id]||[]).length;
  return `<div class="dish" onclick="openDish(${d.id})">
    <div class="pic" style="background:${d.bg}"><img src="${d.img.replace("images/","images/thumb/")}" alt="${d.en}" loading="lazy"></div>
    <div class="d-body">
      <span class="heart" onclick="event.stopPropagation();toggleWish(${d.id})">${saved?"❤️":"🤍"}</span>
      <div class="d-name">${d.zh} <button class="say" onclick="event.stopPropagation();speak('${d.zh}')" aria-label="pronounce">🔊</button></div><div class="d-py">${d.py}</div><div class="d-en">${d.en}</div>
      <div class="d-meta">
        <span class="price">¥${d.price}</span><span>🔥 ${d.cal} ${t("cal")}</span><span>⭐ ${d.rating}</span>
        ${revCount>0?`<span>💬 ${revCount}</span>`:""}
      </div>
      <div class="d-meta">${tags} <span>📍 ${where}</span></div>
    </div>
  </div>`;
}

function navButtons(items){
  return `<div class="navgrid">`+items.map(it=>`<button class="navbtn" onclick="${it.onclick}"><span class="nb-t">${it.label}</span><span class="nb-c">${it.count} ${state.lang==="zh"?"道菜":"dishes"}</span></button>`).join("")+`</div>`;
}

function setSort(v){ state.sort=v; renderAll(); }
function sortDishes(arr){ const a=arr.slice(); const so=state.sort;
  if(so==="recs") a.sort((x,y)=>y.recs-x.recs);
  else if(so==="rating") a.sort((x,y)=>y.rating-x.rating);
  else if(so==="new") a.sort((x,y)=>(y.added||"").localeCompare(x.added||""));
  return a; }
function sortBar(){ const Lzh=state.lang==="zh";
  const o=[["default",Lzh?"默认":"Default"],["recs",Lzh?"推荐最多":"Most recommended"],["rating",Lzh?"评分最高":"Top rated"],["new",Lzh?"最新":"Newest"]];
  return `<div class="sortbar"><span class="sl">${Lzh?"排序":"Sort"}</span><select onchange="setSort(this.value)">`+o.map(([v,l])=>`<option value="${v}"${state.sort===v?" selected":""}>${l}</option>`).join("")+`</select></div>`; }
function dishListHTML(dishArr, loc){ return sortBar()+sortDishes(dishArr).map(d=>dishCard(d,(typeof loc==="function"?loc(d):loc))).join(""); }

function renderBrowse(){
  const head=document.getElementById("menu-head");
  const chips=document.getElementById("filter-chips");
  const list=document.getElementById("dish-list");
  const Lzh = state.lang==="zh";
  if(!state.canteen){
    head.innerHTML=`<div class="section-title"><span>${t("allCanteens")}</span></div>
      <div class="disclaimer" style="text-align:left;padding:0 2px 8px">${t("menuHint")}</div>`;
    const fl=[["all","filterAll"],["veg","filterVeg"],["halal","filterHalal"],["spicy","filterSpicy"],["new","filterNew"]];
    chips.innerHTML=fl.map(([k,lab])=>`<button class="chip ${state.filter===k?"active":""}" onclick="setFilter('${k}')">${t(lab)}</button>`).join("");
    let arr=dishes.slice(); if(state.filter!=="all") arr=arr.filter(d=>d.tags.includes(state.filter));
    list.innerHTML=dishListHTML(arr, d=>dishCanteens(d.id).slice(0,2).map(c=>Lzh?c.zh:c.en).join(", "));
    return;
  }
  const c=canteens.find(x=>x.id===state.canteen);
  chips.innerHTML="";
  const cname=Lzh?c.zh:c.en;
  const sub=`<span>🚶 ${c.walk} ${t("min")}</span><span style="color:#ffd9d9">● ${c.crowd}% ${t("full")}</span>`;

/* ── MAP ── */
let mapS = {scale:1, x:0, y:0, dragging:false, sx:0, sy:0, lx:0, ly:0, pinchD:0};

function initMap(){
  const wrap = document.getElementById("map-wrap");
  wrap.addEventListener("mousedown", e=>{ mapS.dragging=true; mapS.sx=e.clientX-mapS.lx; mapS.sy=e.clientY-mapS.ly; e.preventDefault(); });
  document.addEventListener("mousemove", e=>{ if(!mapS.dragging)return; mapS.x=e.clientX-mapS.sx; mapS.y=e.clientY-mapS.sy; constrainMap(); applyMap(); });
  document.addEventListener("mouseup", ()=>{ mapS.dragging=false; });
  wrap.addEventListener("touchstart", e=>{
    if(e.touches.length===1){ mapS.dragging=true; mapS.sx=e.touches[0].clientX-mapS.lx; mapS.sy=e.touches[0].clientY-mapS.ly; }
    else if(e.touches.length===2){ mapS.dragging=false; mapS.pinchD=pinchDist(e); }
    e.preventDefault();
  },{passive:false});
  wrap.addEventListener("touchmove", e=>{
    if(e.touches.length===1&&mapS.dragging){ mapS.x=e.touches[0].clientX-mapS.sx; mapS.y=e.touches[0].clientY-mapS.sy; constrainMap(); applyMap(); }
    else if(e.touches.length===2){ const d=pinchDist(e); mapS.scale=Math.min(3,Math.max(1,mapS.scale+(d-mapS.pinchD)/180)); mapS.pinchD=d; constrainMap(); applyMap(); }
    e.preventDefault();
  },{passive:false});
  wrap.addEventListener("touchend",()=>{ mapS.dragging=false; });
}
function pinchDist(e){ const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY; return Math.sqrt(dx*dx+dy*dy); }
function zoomMap(delta){ mapS.scale=Math.min(3,Math.max(1,mapS.scale+delta)); constrainMap(); applyMap(); }
function constrainMap(){
  const wrap=document.getElementById("map-wrap");
  const maxX=wrap.offsetWidth*(mapS.scale-1)/2, maxY=wrap.offsetHeight*(mapS.scale-1)/2;
  mapS.x=Math.min(maxX,Math.max(-maxX,mapS.x)); mapS.y=Math.min(maxY,Math.max(-maxY,mapS.y));
  mapS.lx=mapS.x; mapS.ly=mapS.y;
}
function applyMap(){ document.getElementById("map-inner").style.transform=`translate(${mapS.x}px,${mapS.y}px) scale(${mapS.scale})`; }

/* ── LUNCH BUDDY ── */
function openBuddyFinder(){ state.buddyOpen=true; state.buddyFilters={times:[],depts:[],interests:[],expTags:[],lang:[]}; renderBuddySheet();
  document.getElementById("overlay").classList.add("show"); document.getElementById("sheet").classList.add("show"); }

function toggleBuddyFilter(cat, val){ const arr=state.buddyFilters[cat]; const i=arr.indexOf(val); i>=0?arr.splice(i,1):arr.push(val); renderBuddySheet(); }

function matchesBuddy(b){
  const f=state.buddyFilters;
  if(f.times.length && !f.times.some(ti=>b.times.includes(ti))) return false;
  if(f.depts.length && !f.depts.includes(b.dept)) return false;
  if(f.interests.length && !f.interests.some(i=>b.interests.includes(i))) return false;
  if(f.lang.length && !f.lang.some(l=>b.lang.includes(l))) return false;
  return true;
}

function chipRow(cat, opts, labelKey){
  const active=state.buddyFilters[cat];
  const chips=opts.map(o=>`<button class="buddy-chip${active.includes(o)?" on":""}" onclick="toggleBuddyFilter('${cat}','${o}')">${o}</button>`).join("");
  return `<div class="buddy-filter-group"><div class="buddy-filter-label">${t(labelKey)}</div><div class="buddy-chips">${chips}</div></div>`;
}

function renderBuddySheet(){
  const Lzh=state.lang==="zh";
  const matched=buddies.filter(matchesBuddy);
  const countStr=Lzh?`${matched.length} 位同学空闲`:`${matched.length} student${matched.length===1?"":"s"} available`;
  const cards=matched.length?matched.map(b=>{
    const invited=state.invitedBuddies.has(b.id);
    const timePills=b.times.map(ti=>`<span class="buddy-time-chip">${ti}</span>`).join("");
    const intTags=b.interests.map(i=>`<span class="buddy-tag">${i}</span>`).join("");
    const langTags=b.lang.map(l=>`<span class="buddy-lang-tag">${l}</span>`).join("");
    return `<div class="buddy-card">
      <div class="buddy-card-top">
        <div class="buddy-avatar" style="background:${b.avatarBg}">${b.avatar}</div>
        <div class="buddy-info">
          <div class="buddy-name">${b.name}${b.zh&&!Lzh?`<span style="font-size:11px;color:var(--muted);font-weight:600;margin-left:6px">${b.zh}</span>`:""}</div>
          <div class="buddy-meta">${b.year} · ${b.dept}</div>
          <div class="buddy-times">${timePills}</div>
        </div>
      </div>
      <div class="buddy-tags-row">${intTags}${langTags}</div>
      <button class="buddy-invite-btn${invited?" saved":""}" onclick="inviteBuddy(${b.id})" ${invited?"disabled":""}>${invited?(Lzh?"已约 ✓":"Lunch set ✓"):(Lzh?"邀请一起吃饭":"Invite to lunch")}</button>
    </div>`;
  }).join(""):`<div class="buddy-empty"><div class="be-ic">🔍</div><div>${Lzh?"暂无匹配 — 调整筛选":"No matches — adjust filters"}</div></div>`;
  document.getElementById("sheet").innerHTML=`
    <div class="grab"></div>
    <div class="buddy-sheet-inner">
      <h2>${Lzh?"寻找饭搭子 🍜":"Find a Lunch Buddy 🍜"}</h2>
      <div class="bs-sub">${Lzh?"和北大同学一起吃饭，认识新朋友。":"Meet a fellow Beida student over a meal."}</div>
      <button class="lb-postlink" onclick="openPostForm()">＋ ${Lzh?"发布我自己的约饭":"Post your own availability"}</button>
      ${chipRow("times", filterOpts.times, "filterTime")}
      ${chipRow("depts", filterOpts.depts, "filterDept")}
      ${chipRow("interests", filterOpts.interests, "filterInterests")}
      ${chipRow("lang", filterOpts.lang, "filterLang")}
      <div class="buddy-divider"></div>
      <div class="buddy-count">${countStr}</div>
      <div class="buddy-list">${cards}</div>
    </div>`;
}

function inviteBuddy(id){
  const b=buddies.find(x=>x.id===id); if(!b) return;
  if(!state.invitedBuddies.has(id)){
    state.invitedBuddies.add(id);
    state.agreed.push({id:b.id, name:b.name, time:(b.times&&b.times[0])||"12:00", dept:b.dept});
    if(!state.chats[b.id]) state.chats[b.id]=[{from:"them", text:(state.lang==="zh"?"你好！期待一起吃饭 🍜":"Hi! Looking forward to our lunch 🍜"), time:nowHM()}];
  }
  toast((state.lang==="zh"?"已和 ":"Lunch set with ")+b.name+(state.lang==="zh"?" 约好午餐！🍜":"! 🍜"));
  renderBuddySheet(); renderBuddyHome();
}

  closeSheet(); renderBuddyHome(); toast(state.lang==="zh"?"已发布约饭！🍜":"Availability posted! 🍜");
}
function cancelPost(id){ state.myPosts=state.myPosts.filter(p=>p.id!==id); renderBuddyHome(); toast(state.lang==="zh"?"已取消":"Cancelled"); }
function cancelAgreed(i){ const a=state.agreed[i]; state.agreed.splice(i,1); if(a){ state.invitedBuddies.delete(a.id); delete state.chats[a.id]; delete state.chatReplied[a.id]; } renderBuddyHome(); if(state.buddyOpen) renderBuddySheet(); toast(state.lang==="zh"?"已取消午餐":"Lunch cancelled"); }
function nowHM(){ const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }

function speak(zh){
  try{
    if(!("speechSynthesis" in window)){ toast(state.lang==="zh"?"此设备不支持朗读":"Speech not supported on this device"); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(zh); u.lang="zh-CN"; u.rate=0.9;
    const vs=window.speechSynthesis.getVoices()||[];
    const v=vs.find(v=>/zh|chinese|中文|普通话/i.test((v.lang||"")+(v.name||"")));
    if(v) u.voice=v;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function chatName(id){ const a=state.agreed.find(x=>x.id===id); if(a) return a.name; const b=buddies.find(x=>x.id===id); return b?b.name:""; }
function openChat(id){ state.currentChat=id; renderChat(); document.getElementById("overlay").classList.add("show"); document.getElementById("sheet").classList.add("show"); }
function renderChat(){
  const Lzh=state.lang==="zh"; const id=state.currentChat; const name=chatName(id);
  const msgs=state.chats[id]||[];
  const bubbles= msgs.length ? msgs.map(m=>`<div class="chat-row ${m.from}"><div class="bubble ${m.from}">${m.text}<span class="bt">${m.time}</span></div></div>`).join("")
    : `<div class="lb-empty" style="text-align:center">${Lzh?"还没有消息":"No messages yet"}</div>`;
  const quicks=(Lzh?["几点见？","门口见！","我到啦"]:["What time works?","See you at the entrance!","I'm here"]);
  document.getElementById("sheet").innerHTML=`
    <div class="grab"></div>
    <div class="chat-head"><span class="back" onclick="closeSheet()">${Lzh?"‹ 返回":"‹ Back"}</span><h2>${(Lzh?"与 "+name+" 聊天":"Chat with "+name)}</h2></div>
    <div class="chat-body" id="chat-body">${bubbles}</div>
    <div class="chat-quick">${quicks.map(q=>`<button onclick="chatQuick(this)">${q}</button>`).join("")}</div>
    <div class="chat-input-row"><textarea id="chat-input" rows="1" placeholder="${Lzh?"输入消息…":"Type a message…"}"></textarea><button class="chat-send" onclick="sendChat()">${Lzh?"发送":"Send"}</button></div>`;
  const cb=document.getElementById("chat-body"); if(cb) cb.scrollTop=cb.scrollHeight;
}
function chatQuick(b){ const ta=document.getElementById("chat-input"); if(ta){ ta.value=b.textContent; ta.focus(); } }
function sendChat(){
  const id=state.currentChat; const ta=document.getElementById("chat-input"); const txt=(ta?ta.value:"").trim(); if(!txt) return;
  if(!state.chats[id]) state.chats[id]=[];
  state.chats[id].push({from:"me", text:txt, time:nowHM()});
  if(!state.chatReplied[id]){ state.chatReplied[id]=true; const Lzh=state.lang==="zh";
    const reps=Lzh?["好呀，门口见！😄","听起来不错，等你～"]:["Sounds good, see you there! 😄","Great — see you soon!"];
    state.chats[id].push({from:"them", text:reps[id%reps.length], time:nowHM()}); }
  renderChat();
}

function canteenZh(id){ const c=canteens.find(x=>x.id===id); return c?c.zh:id; }
function canteenEn(id){ const c=canteens.find(x=>x.id===id); return c?c.en:id; }
function renderBuddyHome(){
  const Lzh=state.lang==="zh";
  const sub=document.getElementById("lb-sub"); if(sub) sub.textContent=Lzh?"和北大同学一起吃饭，认识新朋友。":"Connect with your fellow Beida students over a meal — a low-key way to meet new people.";
  const bf=document.getElementById("lb-find"); if(bf) bf.textContent=Lzh?"寻找饭搭子":"Find a lunch buddy";
  const bp=document.getElementById("lb-post"); if(bp) bp.textContent=Lzh?"发布我的时间":"Post your availability";
  const box=document.getElementById("buddy-home"); if(!box) return;
  let html="";
  html+=`<div class="lb-section"><div class="lb-sec-t">${Lzh?"我发布的约饭":"Your posted availability"}</div>`;
  html+= state.myPosts.length ? state.myPosts.map(p=>`<div class="lb-row"><div class="lb-row-main"><div class="lb-when">🕒 ${p.time} · ${Lzh?canteenZh(p.canteen):canteenEn(p.canteen)}</div>${p.note?`<div class="lb-note">${p.note}</div>`:""}</div><button class="lb-x" onclick="cancelPost(${p.id})">${Lzh?"取消":"Cancel"}</button></div>`).join("")
    : `<div class="lb-empty">${Lzh?"还没有发布。点击“发布我的时间”。":"None yet — tap “Post your availability”."}</div>`;
  html+=`</div>`;
  html+=`<div class="lb-section"><div class="lb-sec-t">${Lzh?"已约定的午餐":"Your agreed lunches"}</div>`;
  html+= state.agreed.length ? state.agreed.map((a,i)=>`<div class="lb-row"><div class="lb-row-main"><div class="lb-when">🍜 ${a.name} · ${a.time}</div><div class="lb-note">${a.dept||""}</div></div><div class="lb-row-btns"><button class="lb-msg" onclick="openChat(${a.id})">${Lzh?"聊天":"Chat"}</button><button class="lb-x" onclick="cancelAgreed(${i})">${Lzh?"取消":"Cancel"}</button></div></div>`).join("")
    : `<div class="lb-empty">${Lzh?"还没有约定。去“寻找饭搭子”。":"None yet — find someone in “Find a lunch buddy”."}</div>`;
  html+=`</div>`;
  box.innerHTML=html;
}

/* ── Toast ── */
let toastTimer;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 1800);
}

/* ── Render all ── */
function renderAll(){
  renderCanteens();
  renderBrowse();
  renderWishlist(); renderNews(); renderBuddyHome();
}

/* ── Init ── */
setLang("en");
initMap();
</script>
</body>
</html>
